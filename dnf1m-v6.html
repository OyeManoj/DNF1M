doing.","The path through the forest does not choose itself — it is made by what walks through most often.","What a river delta knows about dividing a single force into many useful streams.","The thing that seems most permanent in nature — rock — is the thing most visibly being changed by time.","What the smallest stone at the base of the wall is doing is the same as what the largest one is doing.","Memory does not record — it reconstructs, and every reconstruction changes the original slightly.","What you remember most vividly is not necessarily what was most important.","The past is not fixed — your relationship to it continues to change.","Memory is the story you are telling about who you have been.","What you have forgotten has not gone away — it has just become unavailable.","The experiences you carry without knowing you carry them steer you silently.","Memory is not a library — it is a living interpreter of the past.","What you remember about a person says as much about you as it does about them.","The clearest memories are not always the most accurate ones.","Every version of your past was reconstructed for the needs of the person you were at the time.","What you choose to remember shapes what you become.","Memory is a form of devotion — you preserve what you love by keeping it alive internally.","The past that still hurts is the past you are still in conversation with.","What we call nostalgia is often love without a current address.","Memory is not the past — it is the present's interpretation of the past.","The things you remember without trying are the things that shaped you most deeply.","What you carried from childhood without realising continues to arrive in your adult decisions.","The memory that surfaces at unexpected moments is asking for attention.","What you cannot remember accurately, you fill in with what is consistent with your beliefs about it.","The stories you tell about your past are the stories you are telling about your present.","Memory smooths over the edges of experience in both directions.","What you have been through is stored somewhere in you — even the parts you have not yet revisited.","The childhood you remember is not the childhood you had — it is the childhood you have made.","What persists in memory despite effort to forget it still has something to say.","Memory is selective, which means it is also curated — and the curator has an agenda.","What you remember from any relationship is a specific slice of something much wider.","The past does not change — but the light you cast on it does.","Memory turns experience into identity — which is why what you dwell on matters enormously.","What you are no longer able to remember was still part of making you.","The version of yourself you remember most fondly is not the version others remember.","Memory is the way the past speaks to the present without being invited.","What grief carries is not just loss — it is everything that was present in what was lost.","The smell of something you loved long ago contains everything nostalgia tries to name.","What you remember about a difficult time from the other side of it is different from what you knew inside it.","Memory edits as it stores — the edit is the version you receive.","What the mind returns to in quiet moments is what it has not yet finished with.","The happiest memories often require sadness to be fully felt — time adds depth.","What you carry from your earliest years is the furniture of the rooms you decide everything else in.","Memory of failure is more instructive than failure itself — if you are willing to examine it honestly.","The person you remember being and the person you were are related but not identical.","What remains in memory after everything else fades is what was most emotionally significant.","Memory is not a photograph — it is a painting done by someone with a perspective.","What you once knew and have forgotten still influences the shape of what you still know.","The act of writing something down changes how you remember it.","What you remember of someone after they are gone becomes how you carry them forward.","Memory is time folded — the past and present occupying the same mental space.","What you choose to dwell on from your past becomes part of your future disposition.","The memory of a kindness received can sustain someone for decades — never underestimate it.","What your earliest memory reveals is where your memory decided your story began.","Memory is the mechanism that converts experience into wisdom — if you examine it.","What you cannot remember, your body sometimes still knows.","The recollection changes slightly each time you access it — memory is not read-only.","What you shared with someone becomes a part of you that survives them.","Memory allows you to be in two times at once — handle this power carefully.","What the decades do to pain is not erase it but place it in proportion.","The things you thought you would never forget are the things most at risk.","What you remember from a book says more about what you were ready to receive than about the book.","Memory makes the dead present — this is its greatest gift and its heaviest burden.","What you will remember of today is already being selected, and you have some say in the selection.","The memory that keeps changing is the memory that is still teaching.","What you call your identity is largely a curated collection of remembered events.","Memory stores not just what happened but how you felt about it — and this is not a separation.","What you remember at the end of each year is not the calendar — it is the texture.","The earliest experiences create the lens — everything subsequent is filtered through it.","What you let yourself remember determines what you are able to learn.","Memory is the means by which the past has a vote in the present.","What you choose not to remember still makes choices for you.","The most powerful stories you carry are the ones you have not yet examined.","What you experienced as a child and what happened are not necessarily the same — and both are real.","Memory is not the enemy of the present — it is its context.","What you recall from a conversation and what was said are always, to some degree, different things.","The memory of who you once were is both a constraint and a resource.","What you hold in memory with tenderness is held in memory with gratitude — these are the same.","Memory is how love outlasts presence.","What you have forgotten about your worst day is mostly the detail — what remains is the lesson.","The nostalgia for a simpler time is usually nostalgia for a self that had fewer responsibilities.","What your memory protects you from knowing may be worth the discomfort of knowing.","Memory gives permanence to what was temporary — this is its gift to the temporary.","What you misremember is not a failure of memory — it is a clue about what your memory needed it to mean.","The past is not another country — it is the country you have always been living in.","What you would tell your younger self reveals what you most needed to hear then and perhaps now.","Memory links you to everyone who has come before you and shaped the conditions of your existence.","What you carry of your parents you will pass to your children — knowingly or not.","The memory that makes you laugh and the memory that makes you ache are both part of the same life.","What time does to grief is not erase it but slowly give it a different weight.","Clarity is not the absence of complexity — it is complexity that has been understood.","What you cannot explain simply, you do not yet understand.","The clearest path becomes visible only after you stop moving long enough to see it.","Confusion is not a problem — it is the honest state before understanding.","What you need to decide first is rarely the decision you are trying to make.","Clarity arrives more often in the shower than in the meeting — plan accordingly.","The most useful question is usually not the most obvious one.","What you know with certainty is smaller than what you think you know with certainty.","Clarity is a result, not a starting point — it is earned through honest thinking.","What you cannot see from inside a problem can usually be seen from the outside of it.","The opposite of clarity is not confusion — it is unexamined assumption.","What needs to be said rarely announces itself loudly — it tends to arrive in quiet.","Clarity about what matters is a prerequisite for progress on anything that does.","The question that dissolves a problem is more powerful than the answer that solves it.","What becomes clear when you stop trying to make it clear is what was clear all along.","Most decisions that feel hard are hard because the values they rest on have not been decided.","Clarity does not mean certainty — it means knowing what you know and knowing what you do not.","What the clearest thinkers have in common is the willingness to hold uncertainty without resolving it prematurely.","The most important clarification is usually the one about what you actually want.","What you can write in one sentence, you understand. What requires three paragraphs, you do not yet.","Clarity is contagious — one clear idea makes adjacent ideas clearer.","What appears to be a lack of motivation is often a lack of clarity.","The fog of confusion often lifts when the question is rephrased.","What you are trying to do and what you are actually doing should overlap more than they usually do.","Clarity of purpose is the upstream of all effective action.","What you cannot be honest about with yourself you cannot think clearly about.","The moment you understand the actual problem, you have already solved most of it.","What seems like disagreement is often two people using the same word differently.","Clarity requires the courage to name what is actually happening.","What you need to let go of in order to see clearly is often something you are holding tightly.","The clear answer to the wrong question is still the wrong answer.","What you already know but have not yet admitted to yourself is where most clarity waits.","Clarity is expensive because it requires giving up comfortable ambiguity.","What the clearest communicators share: they thought until they understood, then spoke.","The value of writing is that it forces clarity that thinking can avoid.","What becomes simple on the other side of understanding felt complex on the way there.","Clarity about what you cannot control is as valuable as clarity about what you can.","The most important word in any decision is usually the first word you said about it.","What a clear priority list gives you that no other tool can: permission to say no to everything else.","Clarity in relationships is the kindest thing — ambiguity costs both parties.","What you are not willing to know is the thing most likely preventing your progress.","The clearest signal in any data set is usually the one you least wanted to see.","What you understand well enough to teach, you understand. The rest is memorised but not known.","Clarity is not the removal of nuance — it is the honest organisation of it.","What you decide not to decide has been decided.","The most useful thing about a deadline is the clarity it forces.","What you see when you stop is what was always there before you started moving.","Clarity about values makes tactical decisions much easier.","The clearest conversations begin with the clearest intentions.","What appears obvious after the fact was rarely obvious before it — this should inspire humility.","Clarity is not a state — it is a practice of continual honest recalibration.","What you cannot see from close up is often visible from a slight distance.","The most important meeting to schedule is the one where you examine your own assumptions.","What clarity about the end goal gives you is a way to evaluate every step along the way.","Ambiguity is comfortable until it becomes expensive.","What you need to know to decide is usually less than you think and includes one thing you are avoiding.","The clarity that comes after sitting with a problem is different from the clarity that was there before.","What you are clearest about is what you have thought most carefully about — these are the same thing.","Clarity about what you do not want is often the fastest route to what you do.","The question worth spending time on is the question beneath the question.","What requires a long explanation may not be what it is claimed to be.","Clarity is not a gift — it is the result of being willing to think carefully and honestly.","What is unmeasurable can still be clear — clarity and quantification are not the same.","The most honest thing you can say is often the clearest.","What you see depends enormously on where you stand — change positions before concluding.","Clarity is the difference between motion and direction.","What a clear vision of the outcome gives you is immediate feedback on whether your current action points toward it.","The hardest clarity to achieve is clarity about your own motivations.","What you call complexity is sometimes just a simple thing surrounded by irrelevant information.","Clarity is the prerequisite of courage — you cannot be brave about something you have not yet understood.","What you cannot bear to look at directly is the exact place where clarity is most needed.","The sentence you cut from your writing was usually the sentence that revealed you were unclear.","What a clear no gives the other person is respect — they know where they stand.","Clarity about identity makes decisions about behaviour far simpler.","The most powerful clarifying tool is a question asked of the right person at the right depth.","What you see when you stop forcing an interpretation is closer to what is actually there.","Clarity is the most respectful thing you can bring to a conversation.","What confusion names is often the gap between what you expected and what is.","The clearer your why, the less explanation your how requires.","What you are trying to avoid knowing is the most important thing to know.","Clarity about boundaries is an act of self-knowledge before it is an act of communication.","What understanding gives you that information cannot: a place to stand.","The clearest thinking happens when you are not trying to convince anyone of anything.","What remains after all the noise is removed is not silence — it is the signal.","Clarity requires slowing down. Not stopping — just enough slowing to see what is already there.","What you cannot explain to a ten-year-old may not yet be clear enough to act on.","The clearest statement of a goal is the one that makes it obvious when you have reached it.","What you are genuinely confused about is where the most honest work needs to happen.","You are not your best day or your worst one — you are the line that connects them.","What you think you need and what you actually need have a significant overlap and a significant gap.","The version of you that people see is not the version you are trying to show — and this is fine.","You are not the voice in your head — you are the one who hears it.","What you believe about yourself operates below the level at which you can argue with it.","The self you are building is built in the spaces between decisions, not by the decisions themselves.","You cannot be someone else more effectively than you can be yourself more fully.","What you admire in others is often a version of what you are trying to develop in yourself.","The self is not fixed — it is a direction of becoming.","What you require from others is often what you have not yet learned to give yourself.","You are more consistent than you think and more capable of change than you fear.","What you resist about yourself tends to persist. What you examine tends to shift.","The gap between who you are and who you want to be is not a judgment — it is a direction.","You have survived everything that has tried to stop you so far.","What you know about yourself at forty you could not have known at twenty — and will revise at sixty.","The self that shows up under pressure is the self that is most worth understanding.","What you protect carefully reveals what you value most.","You are the author of the story you tell about yourself — and authors can revise.","What you do habitually is the most honest autobiography you will ever write.","The boundaries you hold tell others what you know about your own value.","You are not behind. There is no schedule.","What you dislike intensely in others sometimes lives quietly in yourself — worth checking.","The parts of yourself you hide take more energy to conceal than they would take to accept.","What you have overcome is a better measure of you than what you have achieved.","You will not become who you want to be by accident.","What you need from a relationship is partly a map of what you have not yet given yourself.","The most radical self-care is the decision to be honest with yourself about what you need.","You are capable of more patience than you currently demonstrate — and so is everyone around you.","What you are drawn to repeatedly is trying to tell you something about who you are.","The self is not a fixed object — it is a continuing project, and the project is never finished.","What you were taught about yourself as a child was one person's interpretation, not the truth.","You contain contradictions and this is not inconsistency — it is completeness.","What you most want to be recognised for is what you most want to believe about yourself.","The hardest person to be fair to is yourself — neither too harsh nor too gentle.","You are not obligated to be the same person you were yesterday.","What you think you deserve tends to be the ceiling of what you allow yourself.","The way you speak about yourself in private becomes the way you relate to yourself in public.","You are doing better than you think you are, and worse than you could be — both things are true.","What you forgive yourself for stops being the thing that shapes your next decision.","The comparison between yourself and others is a comparison of two different problems.","You are not your achievements — but they are clues about where your energy is most willing to go.","What you give yourself permission to feel is the emotional range available to you.","The strongest version of you is not the version that never struggles.","You already know what you need to do. The question is what you are willing to admit.","What your most difficult relationships reveal about you is more useful than what your easiest ones do.","The self you perform for others and the self you are alone should not feel like different people.","You cannot fill another person's emptiness with your own fullness — both things are separate.","What you fear becoming is often a direction, not a destiny.","The approval you seek from others will not resolve the approval you are withholding from yourself.","You are not too much or too little — you are looking for the right context.","What you keep choosing, despite wanting to choose differently, is worth examining without judgment.","The capacity for self-deception is not a character flaw — it is a human feature. Manage it.","You are allowed to change your mind about yourself.","What you were willing to accept five years ago and what you accept today is a measure of growth.","The relationship you have with yourself sets the floor for every other relationship.","You will not find out who you are by thinking about it — you will find out by doing things and noticing.","What you find funny reveals more about you than what you find offensive.","The kindness you extend to strangers is available to yourself — the address is internal.","You are not a finished product awaiting final quality control. You are a process.","What you are too hard on yourself about is usually the thing you care most about.","The version of you that other people know is always a translation.","You get to decide which parts of your history define you and which parts inform you.","What you protect most fiercely is what you are most afraid of losing.","The self expands to include what it is willing to acknowledge.","You do not need to resolve every contradiction in yourself before you are allowed to act.","What you know about yourself that you wish were different is the beginning of change, not the obstacle to it.","The most important conversation you have today will probably be with yourself.","You are more resilient than your most recent difficult moment suggests.","What you do with what you have been given is entirely your own.","The version of yourself you are most afraid to show is often the most interesting one.","You are not the worst thing you have ever done.","What you practise being is closer to what you become than what you intend to become.","The life you are living is the only one of its kind — what you do with it is the question.","You will spend every day with yourself for your entire life. Getting to know yourself seems reasonable.","What you want but do not let yourself have is a map of where your self-worth is bounded.","The most honest form of courage is the courage to see yourself clearly.","You have already changed more than you give yourself credit for.","What you choose to carry forward from your past and what you choose to set down is entirely yours to decide.","The self that knows its own limits is the self that is most effective within them.","You are allowed to want things that are not useful.","What you love without explanation is probably aligned with who you actually are.","The habit of self-criticism without self-compassion is a habit that produces suffering without improvement.","You are, at this moment, enough to take the next step.","What you believe about human nature is what you will find when you look for evidence.","The best investment you can make is in your own understanding.","You will be different in ten years — the question is whether you will be deliberately different.","What you would tell a friend in your situation is probably the most useful advice you have not yet taken.","The self at rest is as real as the self in motion — know both.","You do not owe anyone a performance of happiness you do not feel.","What you are searching for outside yourself has usually been a version of what you were not yet ready to find inside.","The mind at peace is not the mind that has solved everything — it is the mind that has accepted what it cannot.","What you call a bad day is usually a collection of manageable moments that arrived without gaps between them.","The courage to begin again after a genuine failure is rarer and more valuable than never having failed.","What you hold with an open hand is more yours than what you grip.","The most honest answer to most complex questions is that it depends — and this is not evasion.","What you stop needing external validation for, you start owning.","The things that no longer affect you the way they once did are the evidence of your growth.","What you would do if you were not afraid is usually what you should do.","The measure of equanimity is not how you feel on good days but how you recover on bad ones.","What you give freely without expectation returns in forms you did not expect.","The rarest form of intelligence is knowing when not to apply intelligence.","What you are capable of when fully rested and clear-headed is your true capacity, not what you produce when depleted.","The moment you stop needing the outcome to be a particular thing, you become more effective at influencing it.","What you build on honest foundations requires less maintenance than what you build on impressive ones.","The ability to be genuinely happy for another person's success is a form of abundance.","What you lose by being less than honest with yourself costs more than what you gain by the comfortable version.","The person you most need to forgive in order to move forward is probably not the person you are thinking of.","What you do with uncertainty — whether you collapse it prematurely or sit with it — determines your quality of thinking.","The goal is not to eliminate anxiety — it is to act well in its presence.","What you keep returning to in your imagination is an invitation worth accepting.","The only opinion of you that is both constant and completely within your control is your own.","What you notice about a place tells you what kind of attention you brought to it.","The most underrated form of intelligence is knowing what you do not know.","What you do for someone when you receive nothing in return is what actually defines your character.","The quality of your relationships is a function of the quality of your listening.","What you are unwilling to question about yourself is the thing most likely to quietly limit you.","The most honest gift you can give someone is your genuine, undivided presence.","What you call intuition is usually your unconscious pattern-matching finally finding a surface to speak through.","The person who knows exactly what they stand for makes faster decisions than the one who is still deciding.","What you practise daily in small ways, you are building in large ways slowly.","The strength to sit with not knowing is the most useful strength in a complex world.","What you are given and what you do with it are two different stories — only one is yours to write.","The deepest kindness is often the kind that asks for nothing and expects nothing.","What you most regret not saying is usually safer to say than you feared.","The version of you that shows up when things are difficult is not your worst — it is often your realest.","What you expect to find, you tend to find. This is a warning and an invitation.","The quieter you become, the more you can hear — in a room and in yourself.","What you let go of consciously stops returning to take your attention without permission.","The habit of beginning each day with intention is the habit that most changes what each day produces.","What you bring to a conversation determines, more than anything else, what you take away from it.","The single most useful thing you can do for your future self is what you are most reluctant to do now.","What you are today is not a sentence — it is a draft.","The size of your life is determined not by what you are given but by what you are willing to fully inhabit.","What you do between ambition and execution — in the honest middle — is what you actually are.","The most important question you can ask of any moment is whether you are actually in it.","What you have learned the hard way is held differently than what you learned easily — value both equally.","The person who is comfortable with silence is the person you most want in a crisis.","What you are building, day by day, is either the life you intended or the one you arrived at by default.","The most sustainable ambition is the one rooted in genuine curiosity rather than comparison.","What you permit yourself to want honestly is larger and truer than what you allow yourself to want publicly.","The question is not whether you have enough — the question is whether you have enough of what matters.","What you are when no one is watching is not your secret — it is your real self.","The way you treat people who cannot help you is the clearest test of your actual values.","What you return to again and again without obligation is telling you something about where to invest.","The ability to be moved by something beautiful is not a weakness — it is proof of something working correctly.","What you would do with a day that had no obligations is a map to what you actually want.","The self that you are most embarrassed by is the self that is most in need of your own compassion.","What you choose to find funny is more honest than what you choose to find impressive.","The smallest act of genuine kindness has effects that are impossible to measure and not impossible to create.","What you do in the hour before bed determines more about tomorrow than most people realise.","The belief that you do not deserve good things is the thing most worth arguing with.","What you are made of is not determined by your best moments — it is revealed in the recovery from your worst.","The most courageous decision is often the quietest one made alone without any audience.","What you avoid tells the story your achievements are trying to cover up.","The gap between knowing and doing is where most of life's most important work is actually happening.","What you find yourself saying to children is often what you most needed to hear as one.","The life that is examined is not automatically the life that is better — but it is the one lived more deliberately.","What you allow yourself to enjoy fully is what you experience fully.","The deepest satisfaction does not come from having — it comes from becoming.","What you can do nothing about deserves less of your attention than what you can.","The present conversation is the only conversation — everything else is rehearsal or replay.","What you do with ordinary days is the answer to the question of what you are doing with your life.","The wisdom available in a single minute of honest stillness exceeds what most meetings produce in an hour.","What you carry without examining carries you.","The most important skill in any domain is knowing when to stop.","What you give your full attention to knows it — and responds accordingly.","The ordinary Tuesday, fully inhabited, is where most of life actually happens.","What you are willing to sit with patiently, you eventually understand.","The practice of returning — to your values, to your attention, to your breath — is the practice itself.","What you cannot do right now, you can begin now.","The stillness you have just experienced is always available. You merely decided to return to function mkDeck(seed){const a=[...Array(1000).keys()];let s=seed>>>0;const rng=()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/0x100000000};for(let i=999;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const ST={session:+localStorage.getItem('dnf_s')||1,streak:+localStorage.getItem('dnf_k')||0,totSecs:+localStorage.getItem('dnf_ts')||0,seed:+localStorage.getItem('dnf_sd')||(Math.random()*1e9|0),pos:+localStorage.getItem('dnf_p')||0,dur:60,t:60,running:false,locked:false,pen:0,ins:'',tick:null,ptick:null};
if(!localStorage.getItem('dnf_sd'))localStorage.setItem('dnf_sd',ST.seed);
const DECK=mkDeck(ST.seed);

function nextIns(){const ins=INSIGHTS[DECK[ST.pos%1000]];ST.pos++;if(ST.pos%1000===0){ST.seed=Math.random()*1e9|0;localStorage.setItem('dnf_sd',ST.seed);DECK.splice(0,1000,...mkDeck(ST.seed))}localStorage.setItem('dnf_p',ST.pos);return ins}

function enterFS(){const d=document.documentElement;(d.requestFullscreen||d.webkitRequestFullscreen||d.mozRequestFullScreen)?.call(d,{navigationUI:'hide'})}
function inFS(){return!!(document.fullscreenElement||document.webkitFullscreenElement)}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(e=>document.addEventListener(e,()=>{if(!inFS()&&ST.running){setTimeout(enterFS,700);dis('fs')}}));

function fmt(s){if(s>=3600)return Math.floor(s/3600)+':'+String(Math.floor(s%3600/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
const redAt=()=>Math.min(10,Math.floor(ST.dur*0.05));
function setBar(t){$('pb').style.transform='scaleX('+t/ST.dur+')';$('pb').classList.toggle('red',t<=redAt())}
function renderClock(t){$('clock').textContent=fmt(t);$('clock').classList.toggle('red',t<=redAt());$('clock').setAttribute('aria-label',fmt(t)+' remaining');setBar(t)}

function hud(){const s=String(ST.session).padStart(2,'0');$('sn').textContent=s;$('tsn').textContent='S-'+s;$('sk').textContent=ST.streak>0?ST.streak+'x':'—'}

function startTimer(){ST.running=true;ST.locked=false;ST.t=ST.dur;renderClock(ST.t);$('pw').style.display='block';ST.ins=nextIns();$('t-ins').classList.remove('out');$('t-ins').textContent=ST.ins;show('timer');hud();ST.tick=setInterval(tick,1000)}
function resumeTimer(){ST.tick=setInterval(tick,1000)}
function tick(){ST.t--;renderClock(ST.t);if(ST.t<=0){clearInterval(ST.tick);ST.running=false;finish()}}

function dis(cause){if(!ST.running||ST.locked)return;ST.locked=true;clearInterval(ST.tick);document.body.classList.remove('jolt');void document.body.offsetWidth;document.body.classList.add('jolt');setTimeout(()=>document.body.classList.remove('jolt'),300);ST.pen=5;const el=$('dnum');const pop=()=>{el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop')};el.textContent=ST.pen;pop();show('disrupt');ST.ptick=setInterval(()=>{ST.pen--;el.textContent=ST.pen;pop();if(ST.pen<=0){clearInterval(ST.ptick);show('timer');setTimeout(()=>{ST.locked=false;resumeTimer()},180)}},1000)}

const BLK=new Set(['Escape','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','Tab','Meta','ContextMenu']);
document.addEventListener('keydown',e=>{if(!ST.running)return;if(BLK.has(e.key)||e.altKey||(e.ctrlKey&&!['c','v','z','a'].includes(e.key))){e.preventDefault();e.stopPropagation()}dis('key')},true);
document.addEventListener('visibilitychange',()=>{if(document.hidden&&ST.running)dis('tab')});
window.addEventListener('blur',()=>{if(ST.running&&!document.hidden)dis('blur')});
document.addEventListener('contextmenu',e=>{if(ST.running)e.preventDefault()});
window.addEventListener('beforeunload',e=>{if(ST.running){e.preventDefault();e.returnValue=''}});

function finish(){ST.streak++;ST.totSecs+=ST.dur;localStorage.setItem('dnf_k',ST.streak);localStorage.setItem('dnf_ts',ST.totSecs);$('pw').style.display='none';$('dnq').textContent=ST.ins;const mins=Math.round(ST.totSecs/60);const hrs=(ST.totSecs/3600).toFixed(1);$('dnst').textContent=ST.streak+' session'+(ST.streak!==1?'s':'')+' · '+(mins>=60?hrs+' hrs':mins+' min')+' of stillness';const dl=ST.dur>=3600?(ST.dur/3600).toFixed(1)+' hr':ST.dur>=60?(ST.dur/60)+' min':ST.dur+'s';$('dney').textContent=dl+' complete';show('done');setTimeout(()=>{try{document.exitFullscreen?.()}catch{}},12000)}

$('again-btn').addEventListener('click',()=>{ST.session++;localStorage.setItem('dnf_s',ST.session);enterFS();setTimeout(startTimer,500)});

const dps=document.querySelectorAll('.dp[data-s]');
function selDur(secs,btn){ST.dur=secs;dps.forEach(b=>{b.classList.remove('sel');b.setAttribute('aria-pressed','false')});$('ci').value='';if(btn){btn.classList.add('sel');btn.setAttribute('aria-pressed','true')}$('e-dd').textContent=secs>=3600?(secs/3600)+'H':secs>=60?(secs/60)+'M':secs+'S'}
dps.forEach(b=>b.addEventListener('click',()=>selDur(+b.dataset.s,b)));
$('ci').addEventListener('input',function(){const v=parseFloat(this.value);if(v>0){selDur(Math.round(v*60),null);$('e-dd').textContent=v>=60?(v/60).toFixed(1)+'H':v+'M'}});

$('enter-btn').addEventListener('click',()=>{enterFS();SCR.entry.classList.remove('on');setTimeout(startTimer,500)});
hud();
</script>
</body>
